name: Build APK

on:
  push:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate icons
        run: |
          python3 - <<'EOF'
          import os, struct, zlib

          def make_png(size, hex_color):
              r = int(hex_color[1:3], 16)
              g = int(hex_color[3:5], 16)
              b = int(hex_color[5:7], 16)
              def chunk(name, data):
                  c = zlib.crc32(name + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
              sig = b'\x89PNG\r\n\x1a\n'
              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0))
              raw = b''.join(b'\x00' + bytes([r, g, b] * size) for _ in range(size))
              idat = chunk(b'IDAT', zlib.compress(raw))
              iend = chunk(b'IEND', b'')
              return sig + ihdr + idat + iend

          icons = {
              'ic_music':   '#7c6aff',
              'ic_melon':   '#00c73c',
              'ic_genie':   '#0064ff',
              'ic_bugs':    '#ff6b35',
              'ic_flo':     '#2d2d5e',
              'ic_vibe':    '#e8003d',
              'ic_spotify': '#1db954',
              'ic_ytmusic': '#ff0000',
          }
          densities = {'mipmap-mdpi': 48, 'mipmap-hdpi': 72, 'mipmap-xhdpi': 96,
                       'mipmap-xxhdpi': 144, 'mipmap-xxxhdpi': 192}

          for density, size in densities.items():
              folder = f'app/src/main/res/{density}'
              os.makedirs(folder, exist_ok=True)
              for name, color in icons.items():
                  png = make_png(size, color)
                  open(f'{folder}/{name}.png', 'wb').write(png)

          print('Icons generated')
          EOF

      - run: gradle assembleRelease

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: music-app
          path: app/build/outputs/apk/release/*.apk

      - name: Attach APK to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
