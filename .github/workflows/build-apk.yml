name: Build APK

on:
  push:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate app icons
        run: |
          python3 - <<'EOF'
          import os, struct, zlib

          def make_png(size, r, g, b):
              def chunk(name, data):
                  c = zlib.crc32(name + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
              sig = b'\x89PNG\r\n\x1a\n'
              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0))
              raw = b''
              for _ in range(size):
                  row = b'\x00' + bytes([r, g, b] * size)
                  raw += row
              idat = chunk(b'IDAT', zlib.compress(raw))
              iend = chunk(b'IEND', b'')
              return sig + ihdr + idat + iend

          sizes = {'mipmap-mdpi': 48, 'mipmap-hdpi': 72, 'mipmap-xhdpi': 96,
                   'mipmap-xxhdpi': 144, 'mipmap-xxxhdpi': 192}
          for folder, sz in sizes.items():
              path = f'app/src/main/res/{folder}'
              os.makedirs(path, exist_ok=True)
              png = make_png(sz, 124, 106, 255)
              open(f'{path}/ic_launcher.png', 'wb').write(png)
              open(f'{path}/ic_launcher_round.png', 'wb').write(png)
          print('Icons generated')
          EOF

      - name: Build Release APK
        run: gradle assembleRelease

      - name: Find and rename APK
        run: |
          find app/build/outputs/apk/release/ -name "*.apk" | head -1 | xargs -I{} cp {} music-app.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: music-app
          path: music-app.apk

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: music-app.apk
