name: Build APK

on:
  push:
    branches: [main]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate app icons
        run: |
          for dir in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p app/src/main/res/$dir
          done
          convert -size 48x48   xc:'#7c6aff' app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert -size 48x48   xc:'#7c6aff' app/src/main/res/mipmap-mdpi/ic_launcher_round.png
          convert -size 72x72   xc:'#7c6aff' app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert -size 72x72   xc:'#7c6aff' app/src/main/res/mipmap-hdpi/ic_launcher_round.png
          convert -size 96x96   xc:'#7c6aff' app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert -size 96x96   xc:'#7c6aff' app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
          convert -size 144x144 xc:'#7c6aff' app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert -size 144x144 xc:'#7c6aff' app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
          convert -size 192x192 xc:'#7c6aff' app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert -size 192x192 xc:'#7c6aff' app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Build Release APK
        run: gradle assembleRelease

      - name: Find and rename APK
        run: |
          find app/build/outputs/apk/release/ -name "*.apk" | head -1 | xargs -I{} cp {} music-app.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: music-app
          path: music-app.apk

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: music-app.apk
